name: data-feed

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-feed
  cancel-in-progress: true

jobs:
  feed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build feed
        run: node scripts/build-feed.mjs
      - name: Publish to data branch
        run: |
          cd out
          git init -b data
          git config user.name "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git add board.json
          git commit -m "feed $(date -u +%FT%TZ)"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
