name: data-feed

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-feed
  cancel-in-progress: true

jobs:
  feed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch previous feed (carries original schedules forward)
        run: |
          git fetch origin data 2>/dev/null || true
          git show origin/data:board.json > prev-board.json 2>/dev/null || echo "{}" > prev-board.json
      - name: Build feed
        run: node scripts/build-feed.mjs
      - name: Publish to data branch
        run: |
          cd out
          git init -b data
          git config user.name "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          # Carry the daily history archive forward, then overwrite today's
          # snapshot — each day's file converges to that day's final state.
          git fetch "$REMOTE" data 2>/dev/null && git checkout FETCH_HEAD -- history 2>/dev/null || true
          mkdir -p history
          cp board.json "history/$(TZ=America/Toronto date +%F).json"
          git add -A
          git commit -m "feed $(date -u +%FT%TZ)"
          git push --force "$REMOTE" data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
